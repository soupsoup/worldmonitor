name: Civil Unrest Alerts

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:
    inputs:
      test_alert:
        description: 'Send test alert'
        required: false
        default: 'false'

jobs:
  unrest-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Send test alert
        if: github.event.inputs.test_alert == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_UNREST }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🧪 Civil Unrest Alert - Test",
                "description": "Civil unrest alert system is working!",
                "color": "16744448",
                "fields": [
                  {"name": "Status", "value": "Test successful", "inline": true}
                ]
              }]
            }'
          echo "Test alert sent!"

      - uses: actions/checkout@v4
        if: github.event.inputs.test_alert != 'true'

      - name: Restore previous GDELT data
        id: restore
        if: github.event.inputs.test_alert != 'true'
        uses: actions/cache@v4
        with:
          path: gdelt_prev.json
          key: gdelt-unrest-data

      - name: Fetch latest civil unrest events
        id: fetch
        if: github.event.inputs.test_alert != 'true'
        run: |
          # Fetch GDELT civil unrest events - with rate limiting handling
          # Use a cached query with lower frequency
          sleep 1
          GDELT_URL="https://api.gdeltproject.org/api/v2/doc/doc?query=protest%20OR%20riot%20OR%20demonstration&mode=artlist&maxrecords=25&format=json&sort=DateDesc"
          
          RESPONSE=$(curl -s --max-time 10 "$GDELT_URL")
          
          # Check if we got JSON or an error
          if echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
            echo "$RESPONSE" > gdelt_new.json
            NEW_COUNT=$(jq '.articles | length' gdelt_new.json 2>/dev/null || echo "0")
          else
            # Rate limited or error - create empty response
            echo '{"articles": []}' > gdelt_new.json
            NEW_COUNT=0
            echo "GDELT rate limited or error, skipping this run"
          fi
          
          echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
          echo "New civil unrest articles: $NEW_COUNT"
          
          # Check cache
          if [ -f gdelt_prev.json ]; then
            PREV_COUNT=$(jq '.articles | length' gdelt_prev.json 2>/dev/null || echo "0")
            echo "Previous articles: $PREV_COUNT"
            echo "prev_count=$PREV_COUNT" >> $GITHUB_OUTPUT
          else
            echo "No previous data found"
            echo "prev_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Check for significant new events
        id: alert
        if: github.event.inputs.test_alert != 'true' && steps.fetch.outputs.new_count != '0'
        run: |
          # Get the most recent event
          TITLE=$(jq -r '.articles[0].title' gdelt_new.json)
          URL=$(jq -r '.articles[0].url' gdelt_new.json)
          DATE=$(jq -r '.articles[0].seendate' gdelt_new.json)
          DOMAIN=$(jq -r '.articles[0].domain' gdelt_new.json)
          
          echo "New event: $TITLE"
          echo "Date: $DATE"
          
          # Set outputs
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

      - name: Send Discord Webhook
        if: github.event.inputs.test_alert != 'true' && steps.alert.outputs.title != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_UNREST }}
        run: |
          # Send webhook
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "⚠️ Civil Unrest Alert",
                "description": "${{ steps.alert.outputs.title }}",
                "color": "16744448",
                "fields": [
                  {"name": "Date", "value": "${{ steps.alert.outputs.date }}", "inline": true},
                  {"name": "Source", "value": "${{ steps.alert.outputs.domain }}", "inline": true}
                ],
                "url": "${{ steps.alert.outputs.url }}"
              }]
            }'
          echo "Alert sent!"

      - name: Save current GDELT data
        if: github.event.inputs.test_alert != 'true'
        uses: actions/cache@v4
        with:
          path: gdelt_prev.json
          key: gdelt-unrest-data
          save-always: true
