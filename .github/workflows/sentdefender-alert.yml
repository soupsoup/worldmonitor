name: SentDefender Alerts

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:
    inputs:
      test_alert:
        description: 'Send test alert'
        required: false
        default: 'false'

jobs:
  sentdefender-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Send test alert
        if: github.event.inputs.test_alert == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_NEWS }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🧪 SentDefender Alert - Test",
                "description": "SentDefender feed is working!",
                "color": "3447003",
                "fields": [
                  {"name": "Status", "value": "Test successful", "inline": true}
                ]
              }]
            }'
          echo "Test alert sent!"

      - name: Fetch latest from SentDefender
        if: github.event.inputs.test_alert != 'true'
        run: |
          # Use RSSHub on Vercel
          RSSHUB_URL="https://rsshub-five-swart.vercel.app/twitter/user/sentdefender"
          
          # Fetch RSS feed
          curl -s --max-time 20 "$RSSHUB_URL" > feed.xml
          
          if [ ! -s feed.xml ]; then
            echo "Failed to fetch feed"
            exit 0
          fi
          
          # Extract first item
          TITLE=$(grep -oP '<title><!\[CDATA\[.*?\]\]></title>|<title>.*?</title>' feed.xml | head -1 | sed 's/<title>//g;s/<\/title>//g;s/<!\[CDATA\[//g;s/\]\]>//g')
          LINK=$(grep -oP '<link>.*?</link>' feed.xml | head -1 | sed 's/<link>//g;s/<\/link>//g')
          
          if [ -z "$TITLE" ]; then
            echo "No tweet content found"
            exit 0
          fi
          
          echo "Tweet: $TITLE"
          echo "Link: $LINK"
          
          # Truncate if too long
          TWEET="$TITLE"
          if [ ${#TWEET} -gt 200 ]; then
            TWEET="${TWEET:0:197}..."
          fi
          
          # Send to Discord
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_NEWS }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🛡️ SentDefender",
                "description": "'"$TWEET"'",
                "color": "3447003",
                "url": "'"$LINK"'"
              }]
            }'
          
          echo "Alert sent!"
