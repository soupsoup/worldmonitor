name: SentDefender Alerts

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:
    inputs:
      test_alert:
        description: 'Send test alert'
        required: false
        default: 'false'

jobs:
  sentdefender-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Send test alert
        if: github.event.inputs.test_alert == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_NEWS }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🧪 SentDefender Alert - Test",
                "description": "SentDefender feed is working!",
                "color": "3447003",
                "fields": [
                  {"name": "Status", "value": "Test successful", "inline": true}
                ]
              }]
            }'
          echo "Test alert sent!"

      - name: Fetch latest from SentDefender
        if: github.event.inputs.test_alert != 'true'
        run: |
          set +e
          
          # Fetch RSS feed from Nitter
          curl -s --max-time 15 "https://nitter.net/sentdefender/rss" > feed.xml
          
          if [ ! -s feed.xml ]; then
            echo "Failed to fetch feed"
            exit 0
          fi
          
          # Get first tweet
          FIRST_GUID=$(grep -oP '<guid[^>]*>[^<]*</guid>' feed.xml | head -1 | sed 's/<[^>]*>//g')
          FIRST_TITLE=$(grep -oP '<title>[^<]*</title>' feed.xml | head -1 | sed 's/<title>//g;s/<\/title>//g')
          STATUS_ID=$(echo "$FIRST_GUID" | sed 's/[^0-9]//g')
          X_LINK="https://x.com/sentdefender/status/$STATUS_ID"
          
          echo "Latest tweet: $FIRST_TITLE"
          echo "Link: $X_LINK"
          
          # Send to Discord
          # Truncate if too long
          TITLE="$FIRST_TITLE"
          if [ ${#TITLE} -gt 200 ]; then
            TITLE="${TITLE:0:197}..."
          fi
          
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_NEWS }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🛡️ SentDefender",
                "description": "'"$TITLE"'",
                "color": "3447003",
                "url": "'"$X_LINK"'"
              }]
            }'
          
          echo "Alert sent!"
