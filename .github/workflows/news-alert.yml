name: News & Intel Alerts

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:
    inputs:
      test_alert:
        description: 'Send test alert'
        required: false
        default: 'false'

jobs:
  news-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Send test alert
        if: github.event.inputs.test_alert == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_NEWS }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🧪 News & Intel Alert - Test",
                "description": "News alert system is working!",
                "color": "3447003",
                "fields": [
                  {"name": "Status", "value": "Test successful", "inline": true}
                ]
              }]
            }'
          echo "Test alert sent!"

      - name: Fetch latest news from Hacker News
        id: fetch
        if: github.event.inputs.test_alert != 'true'
        run: |
          set +e
          
          TOP_STORIES=$(curl -s --max-time 10 "https://hacker-news.firebaseio.com/v0/topstories.json")
          
          if [ -z "$TOP_STORIES" ] || [ "$TOP_STORIES" = "null" ]; then
            echo "Failed to fetch HN"
            exit 0
          fi
          
          # Get top 3 stories
          STORY_IDS=$(echo "$TOP_STORIES" | jq -r '.[:3] | .[]')
          
          for ID in $STORY_IDS; do
            STORY=$(curl -s --max-time 5 "https://hacker-news.firebaseio.com/v0/item/$ID.json")
            if [ -n "$STORY" ] && [ "$STORY" != "null" ]; then
              TITLE=$(echo "$STORY" | jq -r '.title // empty' 2>/dev/null)
              URL=$(echo "$STORY" | jq -r '.url // empty' 2>/dev/null)
              SCORE=$(echo "$STORY" | jq -r '.score // 0' 2>/dev/null)
              
              if [ -n "$TITLE" ] && [ -n "$URL" ]; then
                echo "Found: $TITLE"
                # Send alert for each top story
                curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_NEWS }}" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "embeds": [{
                      "title": "📰 News Alert",
                      "description": "'"$TITLE"'",
                      "color": "3447003",
                      "fields": [
                        {"name": "Score", "value": "'"$SCORE"'", "inline": true}
                      ],
                      "url": "'"$URL"'"
                    }]
                  }'
              fi
            fi
          done
          
          echo "Alerts sent!"
